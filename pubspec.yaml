name: solo_levelling_app
description: A gamified fitness app with Shadow Monarch RPG aesthetics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Matrix math
  vector_math: ^2.1.4

  # Google Fonts – Cinzel (serif headlines) + Roboto Mono + Rajdhani (body)
  google_fonts: ^6.2.1

  # Local storage for offline quest caching
  shared_preferences: ^2.2.3

  # Sensors for passive tracking
  proximity_sensor: ^1.3.10
  sensors_plus: ^6.1.1
  light: ^5.0.0
  # Supabase for backend
  supabase_flutter: ^2.5.10
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpeg"
  web:
    generate: true
    image_path: "assets/images/logo.jpeg"
    background_color: "#000000"
    theme_color: "#8A2BE2"
  min_sdk_android: 21 # android min sdk min:16, default:21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
