name: solo_levelling_app
description: A gamified fitness app with Shadow Monarch RPG aesthetics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Matrix math
  # Removed vector_math

  # Removed google_fonts

  # Local storage for offline quest caching and state machine
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # Navigation
  go_router: ^13.2.0
  # Supabase for backend
  supabase_flutter: ^2.5.10

  connectivity_plus: ^7.1.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpeg"
  web:
    generate: true
    image_path: "assets/images/logo.jpeg"
    background_color: "#000000"
    theme_color: "#8A2BE2"
  min_sdk_android: 21 # android min sdk min:16, default:21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
